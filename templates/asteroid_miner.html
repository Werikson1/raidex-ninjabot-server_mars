{% extends "base.html" %}

{% block content %}
<div class="card config-card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Asteroid Miner Config</h2>
        <label class="toggle-switch">
            <input type="checkbox" id="botToggle">
            <span class="toggle-slider"></span>
        </label>
    </div>
    <div class="card-body config-layout">
        <div class="config-form-section">
            <form id="configForm">
                <div class="form-group">
                    <label>Select Planet</label>
                    <select id="asteroidPlanet" name="ASTEROID_PLANET_ID" class="compact-input">
                        <option value="">Carregando planetas...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Asteroid Miner Amount</label>
                    <input type="number" id="ASTEROID_MINER_AMOUNT" name="ASTEROID_MINER_AMOUNT" min="1" step="1" class="compact-input" placeholder="Quantidade de naves">
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="HEADLESS_MODE" name="HEADLESS_MODE">
                        Headless Mode (Invisible Browser)
                    </label>
                </div>

                <div class="form-group">
                    <label>Cooldown (Hours)</label>
                    <input type="number" id="COOLDOWN_HOURS" name="COOLDOWN_HOURS" step="0.1" class="compact-input">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Search Delay Min (s)</label>
                        <input type="number" id="SEARCH_DELAY_MIN" name="SEARCH_DELAY_MIN" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Search Delay Max (s)</label>
                        <input type="number" id="SEARCH_DELAY_MAX" name="SEARCH_DELAY_MAX" step="0.1">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>No Asteroid Wait Min (m)</label>
                        <input type="number" id="NO_ASTEROID_WAIT_MIN" name="NO_ASTEROID_WAIT_MIN">
                    </div>
                    <div class="form-group">
                        <label>No Asteroid Wait Max (m)</label>
                        <input type="number" id="NO_ASTEROID_WAIT_MAX" name="NO_ASTEROID_WAIT_MAX">
                    </div>
                </div>

                <div class="form-group">
                    <label>Fleet Fail Wait (m)</label>
                    <input type="number" id="FLEET_FAIL_WAIT_MINUTES" name="FLEET_FAIL_WAIT_MINUTES">
                </div>

                <hr style="margin: 20px 0; border-color: #444;">
                <h4 style="margin-bottom: 15px; color: #ccc;">Sleep Schedule</h4>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="asteroidSleepMode" name="sleep_mode">
                        Sleep Mode
                    </label>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="asteroidRandomSleepMode" name="random_sleep_mode">
                        Random Sleep Mode (±5 min jitter)
                    </label>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Sleep Start Time (HH:MM)</label>
                        <div class="time-grid">
                            <select id="sleepStartHour" class="time-select"></select>
                            <select id="sleepStartMinute" class="time-select"></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Wake Up Time (HH:MM)</label>
                        <div class="time-grid">
                            <select id="wakeHour" class="time-select"></select>
                            <select id="wakeMinute" class="time-select"></select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Save Configuration</button>
            </form>
        </div>

        <div class="cooldown-monitor-section">
            <div class="monitor-header">Active Cooldowns</div>
            <div id="cooldownList" class="cooldown-list">
                <!-- Cooldown items injected here -->
                <div class="cooldown-empty">No active cooldowns</div>
            </div>
        </div>
    </div>
</div>

<!-- Footer Logs -->
<footer class="log-footer">
    <div class="log-header">Execution Log</div>
    <div id="logContainer" class="log-container">
        <!-- Logs will be injected here -->
    </div>
</footer>

<style>
    /* Toggle Switch Styles */
    .toggle-switch {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 34px;
        margin: 0;
    }

    .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
    }

    .toggle-slider:before {
        position: absolute;
        content: "";
        height: 26px;
        width: 26px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
    }

    .toggle-switch input:checked+.toggle-slider {
        background-color: #4caf50;
    }

    .toggle-switch input:checked+.toggle-slider:before {
        transform: translateX(26px);
    }

    .toggle-switch input:disabled+.toggle-slider {
        cursor: not-allowed;
        opacity: 0.5;
    }

    .time-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .time-select {
        width: 100%;
        padding: 8px;
        border: 1px solid #444;
        border-radius: 4px;
        background-color: #2a2a2a;
        color: #fff;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const botToggle = document.getElementById('botToggle');
        const planetSelect = document.getElementById('asteroidPlanet');
        const sleepModeCheckbox = document.getElementById('asteroidSleepMode');
        const randomSleepCheckbox = document.getElementById('asteroidRandomSleepMode');
        const sleepStartHour = document.getElementById('sleepStartHour');
        const sleepStartMinute = document.getElementById('sleepStartMinute');
        const wakeHour = document.getElementById('wakeHour');
        const wakeMinute = document.getElementById('wakeMinute');
        let isUpdatingToggle = false;

        const fetchJson = async (url, options = {}) => {
            const response = await fetch(url, options);
            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || `Request failed: ${response.status}`);
            }
            return response.json();
        };

        const setSelectValue = (select, value) => {
            const valStr = (value ?? '').toString();
            const option = Array.from(select.options).find(o => o.value === valStr);
            if (option) {
                select.value = valStr;
            }
        };

        // Populate time selectors
        const addNumberOptions = (select, max) => {
            select.innerHTML = '';
            for (let i = 0; i <= max; i++) {
                const opt = document.createElement('option');
                opt.value = i.toString();
                opt.textContent = `[${i.toString().padStart(2, '0')}]`;
                select.appendChild(opt);
            }
        };

        // Initialize time selectors
        addNumberOptions(sleepStartHour, 23);
        addNumberOptions(wakeHour, 23);
        addNumberOptions(sleepStartMinute, 59);
        addNumberOptions(wakeMinute, 59);

        // Populate planet selector
        const populatePlanets = async (currentPlanetId) => {
            try {
                const data = await fetchJson('/api/expedition/planets');
                const planets = data.planets || [];
                planetSelect.innerHTML = '';
                if (!planets.length) {
                    const opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = 'No planets found';
                    planetSelect.appendChild(opt);
                    return;
                }
                planets.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.coords ? `${p.name} ${p.coords}` : p.name;
                    planetSelect.appendChild(opt);
                });
                if (currentPlanetId) {
                    setSelectValue(planetSelect, currentPlanetId);
                }
            } catch (error) {
                console.error('Error loading planets:', error);
            }
        };

        // Auto-save planet selection
        planetSelect.addEventListener('change', async () => {
            try {
                await fetchJson('/api/asteroid/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ planet_id: planetSelect.value })
                });
                console.log('Planet saved:', planetSelect.value);
            } catch (error) {
                console.error('Error saving planet:', error);
                alert('Failed to save planet selection');
            }
        });

        // Auto-save sleep settings
        const saveSleepSettings = async () => {
            try {
                await fetchJson('/api/asteroid/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sleep_mode: sleepModeCheckbox.checked,
                        random_sleep_mode: randomSleepCheckbox.checked,
                        sleep_start: {
                            hour: parseInt(sleepStartHour.value, 10) || 0,
                            minute: parseInt(sleepStartMinute.value, 10) || 0
                        },
                        wake_up: {
                            hour: parseInt(wakeHour.value, 10) || 0,
                            minute: parseInt(wakeMinute.value, 10) || 0
                        }
                    })
                });
                console.log('Sleep settings saved');
            } catch (error) {
                console.error('Error saving sleep settings:', error);
            }
        };

        // Add event listeners for sleep settings auto-save
        sleepModeCheckbox.addEventListener('change', saveSleepSettings);
        randomSleepCheckbox.addEventListener('change', saveSleepSettings);
        sleepStartHour.addEventListener('change', saveSleepSettings);
        sleepStartMinute.addEventListener('change', saveSleepSettings);
        wakeHour.addEventListener('change', saveSleepSettings);
        wakeMinute.addEventListener('change', saveSleepSettings);

        // Load config and populate selectors
        const loadConfig = async () => {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                const currentPlanetId = config.ASTEROID_PLANET_ID || config.asteroidPlanet || '';
                await populatePlanets(currentPlanetId);

                // Load sleep settings from asteroid_mode
                const asteroidMode = config.asteroid_mode || {};
                sleepModeCheckbox.checked = asteroidMode.sleep_mode || false;
                randomSleepCheckbox.checked = asteroidMode.random_sleep_mode || false;

                const sleepStart = asteroidMode.sleep_start || {};
                const wakeUp = asteroidMode.wake_up || {};
                setSelectValue(sleepStartHour, sleepStart.hour || 23);
                setSelectValue(sleepStartMinute, sleepStart.minute || 0);
                setSelectValue(wakeHour, wakeUp.hour || 7);
                setSelectValue(wakeMinute, wakeUp.minute || 30);
            } catch (error) {
                console.error('Error loading config:', error);
            }
        };

        // Update toggle state based on asteroid miner status
        async function updateToggleState() {
            if (isUpdatingToggle) return;

            try {
                const response = await fetch('/api/asteroid/status');
                const data = await response.json();
                botToggle.checked = data.enabled || false;
            } catch (error) {
                console.error('Error fetching asteroid miner status:', error);
            }
        }

        // Handle toggle click
        botToggle.addEventListener('change', async () => {
            isUpdatingToggle = true;
            botToggle.disabled = true;

            try {
                const endpoint = botToggle.checked ? '/api/asteroid/start' : '/api/asteroid/stop';
                const response = await fetch(endpoint, { method: 'POST' });
                const data = await response.json();

                console.log('Asteroid miner toggle response:', data);

                // Update state after a short delay
                setTimeout(async () => {
                    await updateToggleState();
                    botToggle.disabled = false;
                    isUpdatingToggle = false;
                }, 500);
            } catch (error) {
                console.error('Error toggling asteroid miner:', error);
                // Revert toggle on error
                botToggle.checked = !botToggle.checked;
                botToggle.disabled = false;
                isUpdatingToggle = false;
            }
        });

        // Initialize
        loadConfig();
        updateToggleState();

        // Poll asteroid miner status periodically
        setInterval(updateToggleState, 2000);
    });
</script>
{% endblock %}
