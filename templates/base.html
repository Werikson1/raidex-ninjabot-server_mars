<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGame XBot Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">OGame XBot</div>
            <nav>
                <a href="#" class="nav-item">Overview</a>
                <a href="{{ url_for('brain_page') }}"
                    class="nav-item {% if request.endpoint == 'brain_page' %}active{% endif %}">Brain</a>
                <a href="{{ url_for('index') }}"
                    class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">Asteroid Miner</a>
                <a href="{{ url_for('expedition_page') }}"
                    class="nav-item {% if request.endpoint == 'expedition_page' %}active{% endif %}">Expedition</a>
                <a href="{{ url_for('farmer_page') }}"
                    class="nav-item {% if request.endpoint == 'farmer_page' %}active{% endif %}">Farmer</a>
                <a href="{{ url_for('empire_page') }}"
                    class="nav-item {% if request.endpoint == 'empire_page' %}active{% endif %}">Empire</a>
                <a href="#" class="nav-item">Scanner</a>
                <a href="#" class="nav-item">Activities</a>
                <a href="#" class="nav-item">Logs</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>

            <div class="bot-control">
                <button id="toggleBotBtn" class="btn btn-start">Start</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="status-indicator">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">Stopped</span>
                </div>
            </header>

            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
