<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGameX Bot Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">OGameX Bot</div>
            <nav>
                <a href="#" class="nav-item">Overview</a>
                <a href="#" class="nav-item">Brain</a>
                <a href="#" class="nav-item active">Asteroid Miner</a>
                <a href="#" class="nav-item">Scanner</a>
                <a href="#" class="nav-item">Farmer</a>
                <a href="#" class="nav-item">Activities</a>
                <a href="#" class="nav-item">Logs</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>

            <div class="bot-control">
                <button id="toggleBotBtn" class="btn btn-start">Start</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="status-indicator">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">Stopped</span>
                </div>
            </header>

            <div class="content-area">
                <div class="card config-card">
                    <div class="card-header">
                        <h2>Asteroid Miner Config</h2>
                    </div>
                    <div class="card-body config-layout">
                        <div class="config-form-section">
                            <form id="configForm">
                                <div class="form-group checkbox-group">
                                    <label>
                                        <input type="checkbox" id="ASTEROID_ENABLED" name="ASTEROID_ENABLED">
                                        Enable Asteroid Miner (persist)
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label>Fleet Group</label>
                                    <select id="FLEET_GROUP_NAME" name="FLEET_GROUP_NAME" class="compact-input">
                                        <option value="">Carregando grupos...</option>
                                    </select>
                                    <input type="hidden" id="FLEET_GROUP_VALUE" name="FLEET_GROUP_VALUE" value="">
                                </div>
                                <div class="form-group">
                                    <label>Asteroid Miner Amount</label>
                                    <input type="number" id="ASTEROID_MINER_AMOUNT" name="ASTEROID_MINER_AMOUNT" min="0" step="1" class="compact-input" placeholder="0 = usar fleet group">
                                </div>

                                <div class="form-group checkbox-group">
                                    <label>
                                        <input type="checkbox" id="HEADLESS_MODE" name="HEADLESS_MODE">
                                        Headless Mode (Invisible Browser)
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label>Cooldown (Hours)</label>
                                    <input type="number" id="COOLDOWN_HOURS" name="COOLDOWN_HOURS" step="0.1"
                                        class="compact-input">
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Search Delay Min (s)</label>
                                        <input type="number" id="SEARCH_DELAY_MIN" name="SEARCH_DELAY_MIN" step="0.1">
                                    </div>
                                    <div class="form-group">
                                        <label>Search Delay Max (s)</label>
                                        <input type="number" id="SEARCH_DELAY_MAX" name="SEARCH_DELAY_MAX" step="0.1">
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>No Asteroid Wait Min (m)</label>
                                        <input type="number" id="NO_ASTEROID_WAIT_MIN" name="NO_ASTEROID_WAIT_MIN">
                                    </div>
                                    <div class="form-group">
                                        <label>No Asteroid Wait Max (m)</label>
                                        <input type="number" id="NO_ASTEROID_WAIT_MAX" name="NO_ASTEROID_WAIT_MAX">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Fleet Fail Wait (m)</label>
                                    <input type="number" id="FLEET_FAIL_WAIT_MINUTES" name="FLEET_FAIL_WAIT_MINUTES">
                                </div>

                                <button type="submit" class="btn btn-primary">Save Configuration</button>
                            </form>
                        </div>

                        <div class="cooldown-monitor-section">
                            <div class="monitor-header">Active Cooldowns</div>
                            <div id="cooldownList" class="cooldown-list">
                                <!-- Cooldown items injected here -->
                                <div class="cooldown-empty">No active cooldowns</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer Logs -->
            <footer class="log-footer">
                <div class="log-header">Execution Log</div>
                <div id="logContainer" class="log-container">
                    <!-- Logs will be injected here -->
                </div>
            </footer>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
